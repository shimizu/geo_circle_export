<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Map Export - 地理的円描画ツール</title>
</head>
<body>
    <div id="map"></div>

    <div id="controls">
        <h3>地図設定</h3>

        <label for="projection-select">投影法</label>
        <select id="projection-select">
            <option value="naturalEarth" selected>Natural Earth</option>
            <option value="mercator">メルカトル</option>
            <option value="orthographic">正射図法</option>
            <option value="equirectangular">正距円筒図法</option>
            <option value="azimuthalEqualArea">方位等積図法</option>
            <option value="conicEqualArea">円錐等積図法</option>
        </select>

        <label for="radius-input">円の半径 (km)</label>
        <input type="number" id="radius-input" value="4000" min="1" max="20000" step="50">

        <p class="hint">地図をクリックして円を配置</p>

        <div id="circle-list"></div>

        <button id="clear-circles" class="btn btn-danger">円をクリア</button>

        <h3>エクスポート</h3>
        <button id="save-svg" class="btn">SVGダウンロード</button>
        <button id="save-png" class="btn">PNGダウンロード</button>
    </div>

    <div id="coords">緯度: -- 経度: --</div>

    <script type="module" src="/index.js"></script>
</body>
</html>
